<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">👤 Mon Profil</span>
        <a th:href="@{/espace-patient}" 
           class="btn btn-outline-light btn-sm">
            ← Mon Espace
        </a>
    </div>
</nav>

<div class="container mt-4">
    <h2>👤 Mon Profil</h2>

    <div th:if="${param.success}" 
         class="alert alert-success">
        Profil mis à jour avec succès ! ✅
    </div>

    <div class="card shadow p-4 mt-3">
        <form th:action="@{/mon-profil}"
              th:object="${user}" method="post">

            <div class="mb-3">
                <label>Nom d'utilisateur</label>
                <input type="text" 
                       th:value="${user.username}"
                       class="form-control" 
                       readonly>
            </div>

            <div class="mb-3">
                <label>Nom complet</label>
                <input type="text" 
                       th:field="*{nomComplet}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" 
                       th:field="*{email}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Rôle</label>
                <input type="text" 
                       th:value="${user.role}"
                       class="form-control" 
                       readonly>
            </div>

            <button type="submit" 
                    class="btn btn-success">
                💾 Sauvegarder
            </button>

        </form>
    </div>
</div>
</body>
</html>
