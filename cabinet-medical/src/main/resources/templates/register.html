<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>📝 Créer un compte Patient</h4>
                </div>
                <div class="card-body">

                    <!-- Message erreur -->
                    <div th:if="${erreur}" 
                         class="alert alert-danger" 
                         th:text="${erreur}"></div>

                    <!-- Message succès -->
                    <div th:if="${param.registered}" 
                         class="alert alert-success">
                        Compte créé ! Connectez-vous 😊
                    </div>

                    <form th:action="@{/register}"
                          th:object="${utilisateur}"
                          method="post">

                        <div class="mb-3">
                            <label>Nom complet *</label>
                            <input type="text" 
                                   th:field="*{nomComplet}"
                                   class="form-control" 
                                   required>
                        </div>

                        <div class="mb-3">
                            <label>Email *</label>
                            <input type="email" 
                                   th:field="*{email}"
                                   class="form-control" 
                                   required>
                        </div>

                        <div class="mb-3">
                            <label>Nom d'utilisateur *</label>
                            <input type="text" 
                                   th:field="*{username}"
                                   class="form-control" 
                                   required>
                        </div>

                        <div class="mb-3">
                            <label>Mot de passe *</label>
                            <input type="password" 
                                   th:field="*{password}"
                                   class="form-control" 
                                   required>
                        </div>

                        <button type="submit" 
                                class="btn btn-primary w-100">
                            Créer mon compte
                        </button>

                        <div class="text-center mt-3">
                            <a th:href="@{/login}">
                                Déjà un compte ? Se connecter
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
