<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fiche Patient</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">

    <h2>📋 Fiche Patient</h2>

    <div class="card mt-3">
        <div class="card-header bg-primary text-white">
            <!-- Affiche nom et prénom du patient -->
            <h5 th:text="${patient.nom + ' ' + patient.prenom}"></h5>
            <div class="card-header bg-primary text-white">
    <div class="d-flex align-items-center gap-3">
        <!-- Photo du patient -->
        <img th:src="@{'/photos/' + ${patient.photo}}"
             onerror="this.src='/photos/default.jpg'"
             style="width:60px;height:60px;
                    border-radius:50%;
                    object-fit:cover;
                    border:2px solid white;">
        <h5 class="mb-0"
            th:text="${patient.nom + ' ' + 
                patient.prenom}">
        </h5>
    </div>
</div>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <p><strong>CIN :</strong> 
                        <span th:text="${patient.cin}"></span></p>
                    <p><strong>Date de naissance :</strong> 
                        <span th:text="${patient.dateNaissance}"></span></p>
                    <p><strong>Téléphone :</strong> 
                        <span th:text="${patient.telephone}"></span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>Email :</strong> 
                        <span th:text="${patient.email}"></span></p>
                    <p><strong>Date création :</strong> 
                        <span th:text="${patient.dateCreation}"></span></p>
                </div>
            </div>
            <div class="mt-3">
                <strong>Antécédents médicaux :</strong>
                <p th:text="${patient.antecedents}"></p>
            </div>
        </div>
    </div>

    <!-- Boutons actions -->
    <div class="mt-3">
        <a th:href="@{/patients/modifier/{id}(id=${patient.id})}" 
           class="btn btn-warning">✏ Modifier</a>
        <a th:href="@{/patients}" 
           class="btn btn-secondary">← Retour liste</a>
    </div>

</div>
</body>
</html>
