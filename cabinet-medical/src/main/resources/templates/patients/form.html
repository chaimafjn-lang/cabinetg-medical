<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Patient</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">

    <!-- Titre dynamique (Ajouter ou Modifier) -->
    <h2 th:text="${titre}"></h2>

    <!-- Message d'erreur -->
    <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

    <!-- Formulaire -->
    <form th:action="@{/patients/sauvegarder}" 
          th:object="${patient}" method="post">

        <!-- id caché pour la modification -->
        <input type="hidden" th:field="*{id}">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>CIN *</label>
                <input type="text" th:field="*{cin}" 
                       class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Date de naissance</label>
                <input type="date" th:field="*{dateNaissance}" 
                       class="form-control">
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Nom *</label>
                <input type="text" th:field="*{nom}" 
                       class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Prénom *</label>
                <input type="text" th:field="*{prenom}" 
                       class="form-control" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Téléphone</label>
                <input type="text" th:field="*{telephone}" 
                       class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email" th:field="*{email}" 
                       class="form-control">
            </div>
        </div>

        <div class="mb-3">
            <label>Antécédents médicaux</label>
            <textarea th:field="*{antecedents}" 
                      class="form-control" rows="3"></textarea>
        </div>

        <!-- Boutons -->
        <button type="submit" class="btn btn-success">
            💾 Sauvegarder
        </button>
        <a th:href="@{/patients}" class="btn btn-secondary">
            ← Annuler
        </a>

    </form>
</div>
</body>
</html>
