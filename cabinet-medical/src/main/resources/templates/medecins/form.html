<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Médecin</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">

    <h2 th:text="${titre}"></h2>

    <!-- Message d'erreur -->
    <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

    <form th:action="@{/medecins/sauvegarder}" 
          th:object="${medecin}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Nom *</label>
                <input type="text" th:field="*{nom}" 
                       class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Prénom *</label>
                <input type="text" th:field="*{prenom}" 
                       class="form-control" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Spécialité</label>
                <input type="text" th:field="*{specialite}" 
                       class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label>Numéro d'ordre *</label>
                <input type="text" th:field="*{numeroOrdre}" 
                       class="form-control" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Téléphone</label>
                <input type="text" th:field="*{telephone}" 
                       class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email" th:field="*{email}" 
                       class="form-control">
            </div>
        </div>

        <div class="mb-3">
            <div class="form-check">
                <!-- Case à cocher pour actif/inactif -->
                <input type="checkbox" th:field="*{actif}" 
                       class="form-check-input">
                <label class="form-check-label">Médecin actif</label>
            </div>
        </div>

        <button type="submit" class="btn btn-success">
            💾 Sauvegarder
        </button>
        <a th:href="@{/medecins}" class="btn btn-secondary">
            ← Annuler
        </a>

    </form>
</div>
</body>
</html>
