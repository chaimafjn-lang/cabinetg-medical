<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Réponse RDV</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f0f2f5; }
        .card {
            border-radius: 20px;
            border: none;
        }
        .icon { font-size: 5rem; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-5 text-center">

                <!-- Succès -->
                <div th:if="${succes}">
                    <div class="icon">✅</div>
                    <h3 class="text-success mt-3 fw-bold">
                        Présence Confirmée !
                    </h3>
                </div>

                <!-- Annulation -->
                <div th:unless="${succes}">
                    <div class="icon">❌</div>
                    <h3 class="text-danger mt-3 fw-bold">
                        RDV Annulé
                    </h3>
                </div>

                <!-- Message -->
                <p class="mt-3 fs-5 text-muted"
                   th:text="${message}"></p>

                <!-- Infos RDV -->
                <div th:if="${rdv != null}"
                     class="alert alert-info mt-3 
                            text-start">
                    <p class="mb-1">
                        <strong>👨‍⚕️ Médecin :</strong>
                        <span th:text="${'Dr. ' +
                            rdv.medecin.nom + ' ' +
                            rdv.medecin.prenom}">
                        </span>
                    </p>
                    <p class="mb-1">
                        <strong>📅 Date :</strong>
                        <span th:text="${rdv.dateHeure
                            .toLocalDate()}">
                        </span>
                    </p>
                    <p class="mb-0">
                        <strong>⏰ Heure :</strong>
                        <span th:text="${rdv.dateHeure
                            .toLocalTime()
                            .toString()
                            .substring(0, 5)}">
                        </span>
                    </p>
                </div>

                <!-- Boutons -->
                <div class="mt-4">
                    <a th:href="@{/accueil}"
                       class="btn btn-primary 
                              rounded-pill px-4">
                        🏠 Retour à l'accueil
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
