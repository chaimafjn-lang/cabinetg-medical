<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulaire RDV</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${titre}"></h2>

    <div th:if="${erreur}" class="alert alert-danger" 
         th:text="${erreur}"></div>

    <form th:action="@{/rendezvous/sauvegarder}"
          th:object="${rdv}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Patient *</label>
                <select th:field="*{patient.id}" 
                        class="form-select" required>
                    <option value="">-- Choisir un patient --</option>
                    <option th:each="p : ${patients}"
                            th:value="${p.id}"
                            th:text="${p.nom + ' ' + p.prenom + 
                                ' (' + p.cin + ')'}">
                    </option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label>Médecin *</label>
                <select th:field="*{medecin.id}" 
                        class="form-select" required>
                    <option value="">-- Choisir un médecin --</option>
                    <option th:each="m : ${medecins}"
                            th:value="${m.id}"
                            th:text="${m.nom + ' ' + m.prenom + 
                                ' - ' + m.specialite}">
                    </option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Date et Heure *</label>
                <input type="datetime-local" 
                       th:field="*{dateHeure}"
                       class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Durée (minutes)</label>
                <select th:field="*{dureeMinutes}" 
                        class="form-select">
                    <option value="15">15 minutes</option>
                    <option value="30">30 minutes</option>
                    <option value="45">45 minutes</option>
                    <option value="60">1 heure</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Motif</label>
                <input type="text" th:field="*{motif}"
                       class="form-control"
                       placeholder="ex: Consultation générale">
            </div>
            <div class="col-md-6 mb-3">
                <label>Statut</label>
                <select th:field="*{statut}" class="form-select">
                    <option value="PLANIFIE">Planifié</option>
                    <option value="CONFIRME">Confirmé</option>
                    <option value="ANNULE">Annulé</option>
                    <option value="TERMINE">Terminé</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn-success">
            💾 Sauvegarder
        </button>
        <a th:href="@{/rendezvous}" class="btn btn-secondary">
            ← Annuler
        </a>

    </form>
</div>
</body>
</html>
